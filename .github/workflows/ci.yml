name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Quality gates: lint, typecheck, tests, build (Node 22).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Smoke-test the composite Action end-to-end on this PR (AC6): it audits this
  # repo in git-only mode and upserts a scorecard comment. fail-on-verdict is
  # false so the smoke job is report-only — the comment is the demonstration, and
  # a fail verdict must not redden CI for the project's own development PRs.
  blastcheck-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so merge-base and `git show <baseline>:task.md` work.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Run blastcheck (local action)
        uses: ./
        with:
          fail-on-verdict: "false"
